    <!-- Twemoji for consistent WhatsApp-style emoji rendering on all platforms -->
    <!-- Using jsDelivr CDN which has proper CORS headers (maxcdn was blocked) -->
    <script src="https://cdn.jsdelivr.net/npm/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        if (typeof twemoji === 'undefined') return; // guard: CDN failed to load
        var opts = { folder: 'svg', ext: '.svg' };
        twemoji.parse(document.body, opts);
        new MutationObserver(function(muts) {
          muts.forEach(function(m) {
            m.addedNodes.forEach(function(n) {
              if (n.nodeType === 1) twemoji.parse(n, opts);
            });
          });
        }).observe(document.body, { childList: true, subtree: true });
      });
    </script>
